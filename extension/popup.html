<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UVT Asist</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="brand">
        <div class="logo">U</div>
        <div>
          <div class="title">UVT Asist</div>
          <div class="subtitle">Asistent pentru studentii UVT</div>
        </div>
      </div>
      <div class="header-actions">
        <button id="themeToggle" class="theme-toggle" type="button" aria-label="Schimba tema">D</button>
        <div id="statusDot" class="status-dot"></div>
      </div>
    </header>

    <section class="faculty-card">
      <div class="faculty-top">
        <label for="faculty">Facultate selectata</label>
        <span id="facultyBadge" class="badge">UVT</span>
      </div>
      <select id="faculty"></select>
    </section>

    <section id="meta" class="meta" aria-live="polite"></section>

    <section id="log" class="chat" aria-label="Chat log">
      <div id="emptyState" class="empty-state">
        <div class="empty-icon">?</div>
        <div class="empty-title">Pune o intrebare</div>
        <div class="empty-text">
          Exemple: orar, burse, admitere, secretariat, contact
        </div>
      </div>
    </section>

    <section class="chips" aria-label="Actiuni rapide">
      <button class="chip" type="button" data-q="Unde gasesc orarul?">Orar</button>
      <button class="chip" type="button" data-q="Unde gasesc informatii despre burse?">Burse</button>
      <button class="chip" type="button" data-q="Care este programul secretariatului?">Secretariat</button>
      <button class="chip" type="button" data-q="Unde gasesc informatii despre admitere?">Admitere</button>
    </section>

    <section class="composer">
      <input id="q" type="text" placeholder="Scrie intrebarea..." />
      <button id="send" type="button">Trimite</button>
    </section>
  </div>

  <script src="popup.js"></script>
</body>
</html>
