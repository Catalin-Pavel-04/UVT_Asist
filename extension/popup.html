<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UVT Asist</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="logo" aria-hidden="true">U</div>
        <div>
          <h1>UVT Asist</h1>
          <p>Răspunsuri din surse oficiale UVT</p>
        </div>
      </div>
      <div class="topbar-actions">
        <button id="themeToggle" class="icon-button" type="button" aria-label="Schimbă tema">Dark</button>
        <span id="backendModeBadge" class="backend-mode-badge" hidden>Local</span>
        <span id="statusDot" class="status-dot" aria-hidden="true"></span>
      </div>
    </header>

    <section id="statusPanel" class="status-panel status-idle" aria-live="polite" hidden>
      <div id="statusTitle" class="status-title">Pregătit</div>
      <div id="statusText" class="status-text">Răspunsurile folosesc căutare vectorială locală și verifică doar sursele de top.</div>
      <div id="indexProgress" class="index-progress" hidden>
        <div class="index-progress-head">
          <span id="indexProgressText">Indexare în curs</span>
          <span id="indexProgressPercent">0%</span>
        </div>
        <div class="progress-track" aria-hidden="true">
          <div id="indexProgressBar" class="progress-bar"></div>
        </div>
      </div>
    </section>

    <section class="control-panel">
      <div class="field-head">
        <label for="faculty">Facultate</label>
        <span id="facultyBadge" class="badge">UVT</span>
      </div>
      <select id="faculty"></select>
    </section>

    <section id="log" class="chat" aria-label="Conversație">
      <div id="emptyState" class="empty-state">
        <div class="empty-kicker">Exemple utile</div>
        <div class="empty-title">Întreabă concret</div>
        <div id="emptyText" class="empty-text">
          Orar, secretariat, admitere, burse sau reguli despre cumularea burselor.
        </div>
      </div>
    </section>

    <section class="conversation-actions" aria-label="Acțiuni conversație">
      <button id="clearConversation" class="secondary-btn danger-action" type="button">Șterge conversația</button>
      <button id="copyAnswer" class="secondary-btn copy-action" type="button" disabled>Copiază răspunsul</button>
    </section>

    <section class="chips" aria-label="Întrebări rapide">
      <button class="chip" type="button" data-q="Unde găsesc orarul?">Orar</button>
      <button class="chip" type="button" data-q="Unde găsesc secretariatul facultății?">Secretariat</button>
      <button class="chip" type="button" data-q="Este posibil ca un student să beneficieze de 2 burse?">Reguli burse</button>
      <button class="chip" type="button" data-q="Unde găsesc informații despre admitere?">Admitere</button>
    </section>

    <details id="recentPanel" class="recent" open>
      <summary class="recent-title">Întrebări recente</summary>
      <div id="recentQuestions" class="recent-list"></div>
    </details>

    <section class="composer">
      <textarea id="q" rows="2" placeholder="Scrie întrebarea aici..."></textarea>
      <button id="send" type="button">Trimite</button>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/state.js"></script>
  <script src="js/render.js"></script>
  <script src="popup.js"></script>
</body>
</html>
